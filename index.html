<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanalga Qo'shiling</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F5ECD7;
      --cream-deep:  #D6C49A;
      --brown:       #5C3D1E;
      --brown-light: #8B6340;
      --red:         #C0392B;
      --red-hover:   #A93226;
      --red-glow:    rgba(192, 57, 43, 0.35);
      --gold:        #B8860B;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'Lora', Georgia, serif;
      color: var(--brown);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 45%, rgba(255,230,170,0.55) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    .corner {
      position: fixed;
      width: 120px; height: 120px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 1;
    }
    .corner.tl { top: 1.5rem; left: 1.5rem; }
    .corner.br { bottom: 1.5rem; right: 1.5rem; transform: rotate(180deg); }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2.2rem;
    }
    .ornament-line {
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, var(--brown-light));
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--brown-light));
    }
    .ornament-diamond {
      width: 7px; height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
    }
    .ornament-dot {
      width: 4px; height: 4px;
      background: var(--brown-light);
      border-radius: 50%;
    }

    .eyebrow {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: var(--brown-light);
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.18;
      color: var(--brown);
      max-width: 700px;
      letter-spacing: -0.01em;
      margin-bottom: 1.6rem;
    }
    h1 span {
      color: var(--red);
      font-style: italic;
    }

    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(to right, var(--gold), var(--red));
      border-radius: 2px;
      margin: 0 auto 2.4rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--red);
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      padding: 1.4rem 3.4rem;
      border-radius: 4px;
      border: 2px solid var(--red);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, transform 0.18s, box-shadow 0.25s;
      box-shadow: 0 6px 28px var(--red-glow), 0 2px 8px rgba(0,0,0,0.08);
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn svg {
      width: 22px; height: 22px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .btn:hover {
      background: var(--red-hover);
      border-color: var(--red-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px var(--red-glow), 0 4px 12px rgba(0,0,0,0.1);
    }
    .btn:hover svg { transform: translateX(3px); }
    .btn:active { transform: translateY(0); }

    .lock-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(92, 61, 30, 0.08);
      border: 1px solid rgba(92, 61, 30, 0.16);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--brown-light);
      text-transform: uppercase;
      margin-top: 1.5rem;
    }
    .lock-badge svg { width: 12px; height: 12px; }

    .bottom-ornament {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      align-items: center;
      z-index: 1;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--cream-deep); }
    .dot.mid { background: var(--gold); width: 7px; height: 7px; }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .btn { font-size: 1rem; padding: 1.1rem 2rem; }
      .corner { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>
